name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: verify meta.json
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify every snapshot plan dir has meta.json
        run: python3 verify.py
